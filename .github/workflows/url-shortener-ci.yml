name: url-shortener-ci

# BRD AC-8, NFR-5: run pytest on every push to the feature branch and on
# pull requests targeting master. Must complete in <= 3 minutes.
on:
  push:
    branches:
      - aisdlc-url-shortener-v2
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Run pytest (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        # NFR-4: only fastapi, uvicorn[standard], and test tooling (pytest, httpx)
        run: |
          python -m pip install --upgrade pip
          pip install -r url_shortener/requirements.txt pytest

      - name: Run pytest
        # ADR-003: PYTHONPATH=url_shortener so 'import main' resolves correctly
        # HLD §8 risk 4: explicit PYTHONPATH prevents ModuleNotFoundError
        env:
          PYTHONPATH: url_shortener
        run: |
          pytest url_shortener/test_main.py -v --tb=short
